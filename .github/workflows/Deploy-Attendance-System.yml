name: Deploy AI Attendance System

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production VM
    runs-on: self-hosted

    steps:
      - name: Pull latest changes
        run: |
          cd /var/www/ai-attendance/AI-Camera-Based-Attendance-system
          git pull origin main

      - name: Install Python dependencies
        run: |
          cd /var/www/ai-attendance/AI-Camera-Based-Attendance-system
          source venv/bin/activate
          pip install -r requirements.txt
          deactivate

      - name: Run Enrollment Script
        run: |
          cd /var/www/ai-attendance/AI-Camera-Based-Attendance-system
          source venv/bin/activate
          python enroll_from_api.py
          deactivate

      - name: Check what changed
        id: changes
        run: |
          cd /var/www/ai-attendance/AI-Camera-Based-Attendance-system
          if git diff --name-only HEAD~1 HEAD | grep -q "requirements.txt\|Dockerfile"; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
          else
            echo "rebuild=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Docker
        run: |
          cd /var/www/ai-attendance/AI-Camera-Based-Attendance-system

          if [ "${{ steps.changes.outputs.rebuild }}" = "true" ]; then
            echo ">>> Dockerfile or requirements.txt changed — full rebuild..."
            docker compose down
            docker compose build
            docker compose up -d
          else
            echo ">>> Only code changed — restarting container..."
            docker compose down
            docker compose up -d
          fi

      - name: Health Check
        run: |
          echo ">>> Waiting for app to start..."
          sleep 15
          curl -f http://localhost:8000/health && echo ">>> App is healthy!" || exit 1
